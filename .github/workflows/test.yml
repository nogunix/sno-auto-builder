name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax check / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora 43
            image: fedora:43
            install: dnf install -y ansible-core git
          - name: Fedora 44
            image: fedora:44
            install: dnf install -y ansible-core git
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            install: apt-get update -q && DEBIAN_FRONTEND=noninteractive apt-get install -y ansible-core git
          - name: Ubuntu 26.04
            image: ubuntu:26.04
            install: apt-get update -q && DEBIAN_FRONTEND=noninteractive apt-get install -y ansible-core git
          - name: CentOS Stream 9
            image: quay.io/centos/centos:stream9
            install: dnf install -y ansible-core git
          - name: CentOS Stream 10
            image: quay.io/centos/centos:stream10
            install: dnf install -y ansible-core git
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core
        run: ${{ matrix.install }}

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run syntax check
        run: |
          for pb in 01-infra-bastion.yml 02-create-sno-cluster.yml 03-expose-console.yml 99-destroy-all.yml; do
            ansible-playbook --syntax-check -i test/inventory "$pb"
          done

  validate-templates:
    name: Template render + tofu validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create fake pull secret
        run: |
          mkdir -p "$HOME/openshift-pull-secret"
          echo '{"auths":{"fake.example.com":{"auth":"ZmFrZTpmYWtl"}}}' \
            > "$HOME/openshift-pull-secret/openshift-pull-secret.txt"

      - name: Render templates
        run: ansible-playbook test-render.yml

      - name: tofu init
        run: tofu -chdir=/tmp/sno-rendered init

      - name: tofu validate
        run: tofu -chdir=/tmp/sno-rendered validate
